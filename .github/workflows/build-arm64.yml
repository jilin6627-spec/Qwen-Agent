name: build-arm64-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - agent_qwq_gui.py
      - Dockerfile
      - .github/workflows/build-arm64.yml

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/arm64 image
        run: |
          IMAGE_TAG="qwen-agent-qwq-gui:${GITHUB_SHA}"
          docker buildx build \
          --platform linux/arm64 \
          --load \
          -t "${IMAGE_TAG}" \
          .

          docker save "${IMAGE_TAG}" | gzip > qwen-agent-qwq-gui_arm64_${GITHUB_SHA}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen-agent-qwq-gui-arm64-image
          path: qwen-agent-qwq-gui_arm64_${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Test image and start container
        run: |
          IMAGE_TAG="qwen-agent-qwq-gui:${GITHUB_SHA}"
          echo "=== Testing loaded image on arm64 runner ==="
          docker images
          echo "Image ID: $(docker inspect --format='{{.Id}}' "${IMAGE_TAG}")"
          echo "=== Starting container, wait 10 seconds for startup ==="
          docker run -d --name qwen-test -p 8080:8080 -p 7860:7860 "${IMAGE_TAG}"
          sleep 10
          echo "=== Container status ==="
          docker ps -a
          echo "=== Container logs (last 50 lines) ==="
          docker logs qwen-test --tail 50
          echo "=== Health check ==="
          curl -s -m 5 http://localhost:8080/healthz || echo "Health check failed"
          echo "=== Stopping test container ==="
          docker stop qwen-test && docker rm qwen-test
          echo "=== Test completed, starting interactive tmate session ==="
      
# 移除 tmate 等待步骤，直接完成构建发布
      - name: Download existing release and upload asset
        run: |
          # 安装 gh release upload 依赖
          echo "All steps completed. Image is ready."


