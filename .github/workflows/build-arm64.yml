name: build-arm64-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - agent_qwq_min.py
      - Dockerfile
      - .github/workflows/build-arm64.yml

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/arm64 image
        run: |
          IMAGE_TAG="qwen-agent-qwq:${GITHUB_SHA}"
          docker buildx build \
          --platform linux/arm64 \
          --load \
          -t "${IMAGE_TAG}" \
          .

          docker save "${IMAGE_TAG}" | gzip > qwen-agent-qwq_arm64_${GITHUB_SHA}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen-agent-qwq-arm64-image
          path: qwen-agent-qwq_arm64_${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 7
